name: Databus catalog sync

on:
  push:
    branches: [main, master]
    paths:
      - "catalog/**"
      - "src/databus_manager/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/databus-publish.yml"
  pull_request:
    paths:
      - "catalog/**"
      - "src/databus_manager/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

concurrency:
  group: databus-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Keep in sync with .python-version
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Databus sync (dry run by default)
        env:
          DATABUS_API_KEY: ${{ secrets.DATABUS_API_KEY }}
        run: uv run python -m databus_manager --catalog catalog
        # Template: default CLI is dry run. To attempt real registration after implementing
        # register_* stubs, use: uv run python -m databus_manager --catalog catalog --apply

      - name: Upload Databus log artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: databus-logs-${{ github.run_id }}
          path: catalog/.databus/logs/
          if-no-files-found: warn
