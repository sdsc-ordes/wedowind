name: Databus first sync and publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run compare/pull/classify without changing catalog or publishing"
        required: true
        default: "true"
      pull_only:
        description: "Run discrepancy pull/update without publishing new entries"
        required: true
        default: "false"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Sync catalog with Databus (Databus wins)
        env:
          DATABUS_API_KEY: ${{ secrets.DATABUS_API_KEY }}
        run: |
          DRY_ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY_ARGS="--dry-run"; fi
          PULL_ARGS=""
          if [ "${{ github.event.inputs.pull_only }}" = "true" ]; then PULL_ARGS="--pull-only"; fi
          uv run python -m databus_manager.sync_catalog_with_databus $DRY_ARGS $PULL_ARGS
