[project]
name = "wedowind"
version = "0.1.0"
description = "Research Data Infrastructure for the WeDoWind community"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "jsonschema>=4.22.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/databus_manager"]
